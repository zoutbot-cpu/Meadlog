<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mead Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#1c140f;
  --surface:#271c14;
  --surface-2:#33261a;
  --text:#f3e8d6;
  --text-muted:#b3a087;
  --honey:#e3a23d;
  --honey-deep:#c97f1e;
  --berry:#9c3b4c;
  --line:#4a3826;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top left, #2a1e14 0%, transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:32px 20px 80px;
}
.wrap{max-width:900px;margin:0 auto;}

header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  margin-bottom:32px;
  padding-bottom:20px;
  border-bottom:1px solid var(--line);
}
.title-block h1{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:2.4rem;
  margin:0;
  letter-spacing:-0.01em;
  display:flex;
  align-items:center;
  gap:14px;
}
.title-block p{
  margin:6px 0 0;
  color:var(--text-muted);
  font-size:0.95rem;
}
.hydrometer{ flex-shrink:0; }

button{
  font-family:'Inter',sans-serif;
  cursor:pointer;
  border:none;
  border-radius:8px;
  font-weight:600;
  font-size:0.9rem;
  transition:transform .12s ease, background .15s ease;
}
button:active{ transform:scale(0.97); }

.btn-primary{
  background:var(--honey);
  color:#1c140f;
  padding:11px 20px;
}
.btn-primary:hover{ background:#edb257; }

.btn-ghost{
  background:transparent;
  color:var(--text-muted);
  padding:9px 14px;
  border:1px solid var(--line);
}
.btn-ghost:hover{ color:var(--text); border-color:var(--honey-deep); }

.btn-danger{
  background:transparent;
  color:var(--berry);
  padding:8px 12px;
  border:1px solid transparent;
  font-size:0.82rem;
}
.btn-danger:hover{ background:rgba(156,59,76,0.15); }

/* Empty state */
.empty{
  text-align:center;
  padding:70px 20px;
  color:var(--text-muted);
  border:1px dashed var(--line);
  border-radius:var(--radius);
}
.empty h3{
  font-family:'Fraunces',serif;
  color:var(--text);
  font-size:1.3rem;
  margin-bottom:8px;
}

/* Batch grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:16px;
}
.tag{
  background:var(--surface);
  border:1px solid var(--line);
  border-left:4px solid var(--honey);
  border-radius:var(--radius);
  padding:18px 18px 16px;
  cursor:pointer;
  position:relative;
  transition:border-color .15s ease, transform .12s ease;
}
.tag:hover{ border-color:var(--honey-deep); transform:translateY(-2px); }
.tag .hole{
  position:absolute; top:14px; right:14px;
  width:10px;height:10px;border-radius:50%;
  background:var(--bg); border:1px solid var(--line);
}
.tag h3{
  font-family:'Fraunces',serif;
  font-size:1.15rem;
  margin:0 0 4px;
  padding-right:20px;
}
.tag .recipe{
  color:var(--text-muted);
  font-size:0.82rem;
  margin-bottom:14px;
}
.tag .og{
  font-family:'IBM Plex Mono',monospace;
  font-size:1.5rem;
  color:var(--honey);
}
.tag .og-label{
  font-size:0.68rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-muted);
  display:block;
  margin-bottom:2px;
}
.tag .meta{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  font-size:0.78rem;
  color:var(--text-muted);
  border-top:1px solid var(--line);
  padding-top:10px;
}
.status-pill{
  font-size:0.68rem;
  padding:2px 8px;
  border-radius:20px;
  background:var(--surface-2);
  border:1px solid var(--line);
  text-transform:uppercase;
  letter-spacing:0.04em;
}

/* Forms */
.panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
}
.panel h2{
  font-family:'Fraunces',serif;
  margin-top:0;
  font-size:1.4rem;
}
.field{ margin-bottom:16px; }
.field label{
  display:block;
  font-size:0.8rem;
  color:var(--text-muted);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
input[type=text], input[type=date], input[type=number], textarea, select{
  width:100%;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:6px;
  padding:10px 12px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:0.92rem;
}
input:focus, textarea:focus, select:focus{
  outline:2px solid var(--honey-deep);
  outline-offset:1px;
}
.og-input{ font-family:'IBM Plex Mono',monospace; }
.row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.ing-row{
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:8px;
  margin-bottom:8px;
  align-items:center;
}
.ing-row input{ padding:8px 10px; font-size:0.88rem; }
.remove-x{
  background:transparent;
  border:none;
  color:var(--text-muted);
  font-size:1.1rem;
  padding:4px 8px;
}
.remove-x:hover{ color:var(--berry); }
.add-ing{
  background:var(--surface-2);
  border:1px dashed var(--line);
  color:var(--text-muted);
  padding:9px;
  width:100%;
  margin-top:4px;
}
.add-ing:hover{ color:var(--honey); border-color:var(--honey-deep); }

.form-actions{
  display:flex;
  gap:10px;
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid var(--line);
}

/* Detail view */
.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:24px;
  gap:16px;
}
.detail-header h2{
  font-family:'Fraunces',serif;
  font-size:1.8rem;
  margin:0 0 4px;
}
.detail-header .recipe{ color:var(--text-muted); font-size:0.9rem; }
.stat-row{
  display:flex;
  gap:14px;
  margin:18px 0 24px;
  flex-wrap:wrap;
}
.stat{
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px 18px;
  min-width:110px;
}
.stat .val{
  font-family:'IBM Plex Mono',monospace;
  font-size:1.3rem;
  color:var(--honey);
}
.stat .lbl{
  font-size:0.68rem;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--text-muted);
}
section.block{ margin-bottom:28px; }
section.block h3{
  font-family:'Fraunces',serif;
  font-size:1.1rem;
  border-bottom:1px solid var(--line);
  padding-bottom:8px;
  margin-bottom:14px;
}
table.ing-table{ width:100%; border-collapse:collapse; }
table.ing-table td{
  padding:9px 4px;
  border-bottom:1px solid var(--line);
  font-size:0.9rem;
}
table.ing-table td.amt{
  font-family:'IBM Plex Mono',monospace;
  color:var(--honey);
  text-align:right;
  white-space:nowrap;
}

.note{
  border-left:3px solid var(--honey-deep);
  background:var(--surface-2);
  padding:12px 14px;
  border-radius:0 8px 8px 0;
  margin-bottom:10px;
}
.note .date{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.75rem;
  color:var(--honey);
  margin-bottom:4px;
}
.note p{ margin:0; font-size:0.9rem; white-space:pre-wrap; }

.hidden{ display:none !important; }
.top-actions{ display:flex; justify-content:space-between; margin-bottom:18px; }

::placeholder{ color:#6b5a44; }

.drive-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px 16px;
  margin-bottom:24px;
  font-size:0.85rem;
}
.drive-status{ display:flex; align-items:center; gap:8px; color:var(--text-muted); }
.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--berry);
  flex-shrink:0;
}
.dot.connected{ background:#7fae5c; }
.dot.syncing{ background:var(--honey); animation:pulse 1s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.drive-actions{ display:flex; gap:8px; }
.drive-actions button{ padding:6px 12px; font-size:0.8rem; }

/* ---------- Mobile ---------- */
@media (max-width: 640px){
  body{ padding:16px 12px 90px; }

  header{
    flex-direction:column;
    align-items:flex-start;
    gap:14px;
  }
  .title-block h1{ font-size:1.9rem; }
  header .btn-primary{ width:100%; padding:13px 20px; font-size:0.95rem; }

  .drive-bar{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
  }
  .drive-actions{ justify-content:stretch; }
  .drive-actions button{ flex:1; padding:9px 10px; }

  .grid{ grid-template-columns:1fr; }

  .row2{ grid-template-columns:1fr; gap:0; }

  .ing-row{
    grid-template-columns:1fr auto;
    grid-template-areas:
      "name name"
      "amount unit"
      "remove remove";
    row-gap:6px;
    padding:10px;
    background:var(--surface-2);
    border-radius:8px;
    margin-bottom:10px;
  }
  .ing-row input[data-field="name"]{ grid-area:name; }
  .ing-row input[data-field="amount"]{ grid-area:amount; }
  .ing-row input[data-field="unit"]{ grid-area:unit; }
  .ing-row .remove-x{
    grid-area:remove;
    justify-self:end;
    padding:6px 10px;
    font-size:1rem;
  }

  .top-actions{ flex-wrap:wrap; gap:10px; }
  .top-actions > div{ display:flex; gap:8px; width:100%; }
  .top-actions > div button{ flex:1; }

  .detail-header{ flex-direction:column; }
  .stat-row{ gap:10px; }
  .stat{ flex:1; min-width:0; }

  .form-actions{ flex-direction:column; }
  .form-actions button{ width:100%; padding:13px; }

  table.ing-table{ display:block; overflow-x:auto; white-space:nowrap; }

  input[type=text], input[type=date], input[type=number], textarea, select{
    font-size:16px; /* prevents iOS/Android auto-zoom on focus */
    padding:12px;
  }

  .tag{ padding:16px; }
  button{ min-height:40px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>
        <svg class="hydrometer" width="26" height="44" viewBox="0 0 26 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="34" r="9" fill="var(--honey)" opacity="0.9"/>
          <rect x="10.5" y="2" width="5" height="26" rx="2.5" fill="var(--surface-2)" stroke="var(--honey-deep)" stroke-width="1"/>
          <line x1="10.5" y1="10" x2="15.5" y2="10" stroke="var(--honey-deep)" stroke-width="1"/>
          <line x1="10.5" y1="16" x2="15.5" y2="16" stroke="var(--honey-deep)" stroke-width="1"/>
        </svg>
        Mead Log
      </h1>
      <p>Recipes, gravity readings, and notes for every batch.</p>
    </div>
    <button class="btn-primary" id="newBatchBtn">+ New Batch</button>
  </header>

  <div class="drive-bar" id="driveBar">
    <div class="drive-status">
      <span class="dot" id="driveDot"></span>
      <span id="driveStatusText">Not connected to Google Drive</span>
    </div>
    <div class="drive-actions">
      <button class="btn-ghost" id="driveConnectBtn">Connect Drive</button>
      <button class="btn-ghost" id="driveSettingsBtn" title="Client ID settings">⚙</button>
    </div>
  </div>

  <div class="panel" id="driveSettingsPanel" style="margin-bottom:24px;" hidden>
    <div class="field">
      <label>Google OAuth Client ID</label>
      <input type="text" id="clientIdInput" placeholder="xxxx.apps.googleusercontent.com">
    </div>
    <div class="form-actions" style="margin-top:0;padding-top:0;border-top:none;">
      <button class="btn-primary" id="saveClientIdBtn">Save</button>
      <button class="btn-ghost" id="closeSettingsBtn">Close</button>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div id="emptyState" class="empty hidden">
      <h3>No batches yet</h3>
      <p>Start your first mead and it'll show up here.</p>
    </div>
    <div id="grid" class="grid"></div>
  </div>

  <!-- FORM VIEW (new / edit) -->
  <div id="formView" class="hidden">
    <div class="top-actions">
      <button class="btn-ghost" id="formBackBtn">&larr; Back</button>
    </div>
    <div class="panel">
      <h2 id="formTitle">New Batch</h2>
      <div class="field">
        <label>Batch name</label>
        <input type="text" id="f-name" placeholder="e.g. Orange Blossom Traditional">
      </div>
      <div class="row2">
        <div class="field">
          <label>Recipe / style</label>
          <input type="text" id="f-recipe" placeholder="e.g. JAOM, semi-sweet traditional">
        </div>
        <div class="field">
          <label>Date started</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Starting gravity (OG)</label>
          <input type="text" class="og-input" id="f-og" placeholder="1.098">
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option>Fermenting</option>
            <option>Aging</option>
            <option>Bottled</option>
            <option>Finished</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Ingredients</label>
        <div id="ingRows"></div>
        <button class="add-ing" id="addIngBtn" type="button">+ Add ingredient</button>
      </div>

      <div class="form-actions">
        <button class="btn-primary" id="saveBatchBtn">Save Batch</button>
        <button class="btn-ghost" id="cancelBatchBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" class="hidden">
    <div class="top-actions">
      <button class="btn-ghost" id="detailBackBtn">&larr; Back</button>
      <div>
        <button class="btn-ghost" id="editBatchBtn">Edit</button>
        <button class="btn-danger" id="deleteBatchBtn">Delete batch</button>
      </div>
    </div>
    <div class="panel">
      <div class="detail-header">
        <div>
          <h2 id="d-name"></h2>
          <div class="recipe" id="d-recipe"></div>
        </div>
        <span class="status-pill" id="d-status"></span>
      </div>

      <div class="stat-row">
        <div class="stat">
          <div class="val" id="d-og"></div>
          <div class="lbl">Starting Gravity</div>
        </div>
        <div class="stat">
          <div class="val" id="d-date"></div>
          <div class="lbl">Date Started</div>
        </div>
      </div>

      <section class="block">
        <h3>Ingredients</h3>
        <table class="ing-table" id="d-ing-table"></table>
      </section>

      <section class="block">
        <h3>Notes</h3>
        <div class="row2" style="margin-bottom:12px;">
          <div class="field" style="margin-bottom:0;">
            <label>Date</label>
            <input type="date" id="note-date">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>&nbsp;</label>
            <button class="btn-primary" id="addNoteBtn" style="width:100%;">Add note</button>
          </div>
        </div>
        <textarea id="note-text" rows="3" placeholder="Racked to secondary, tastes dry but promising..." style="margin-bottom:14px;"></textarea>
        <div id="notesList"></div>
      </section>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'mead-batches';
let batches = [];
let currentIngRows = [];
let editingId = null;
let activeBatchId = null;

// Use Claude's artifact storage when available (inside claude.ai),
// otherwise fall back to the browser's localStorage (when opened as a local file).
const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage;
const store = {
  async get(key){
    if(hasClaudeStorage){
      return await window.storage.get(key, false);
    }
    const raw = localStorage.getItem(key);
    return raw ? { value: raw } : null;
  },
  async set(key, value){
    if(hasClaudeStorage){
      return await window.storage.set(key, value, false);
    }
    localStorage.setItem(key, value);
    return { value };
  }
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
}

async function loadBatches(){
  try{
    const res = await store.get(STORAGE_KEY);
    batches = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    batches = [];
  }
  renderList();
}

async function saveBatches(){
  try{
    await store.set(STORAGE_KEY, JSON.stringify(batches));
    pushToDrive();
  }catch(e){
    console.error('Storage error', e);
    alert('Could not save — please try again.');
  }
}

function showView(view){
  ['listView','formView','detailView'].forEach(id=>{
    document.getElementById(id).classList.toggle('hidden', id !== view);
  });
}

/* ---------- LIST ---------- */
function renderList(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';
  if(batches.length === 0){
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  batches.slice().sort((a,b)=> (b.dateStarted||'').localeCompare(a.dateStarted||'')).forEach(b=>{
    const card = document.createElement('div');
    card.className = 'tag';
    card.innerHTML = `
      <div class="hole"></div>
      <h3>${escapeHtml(b.name || 'Untitled batch')}</h3>
      <div class="recipe">${escapeHtml(b.recipe || 'No recipe noted')}</div>
      <span class="og-label">Starting Gravity</span>
      <div class="og">${escapeHtml(b.og || '—')}</div>
      <div class="meta">
        <span>${fmtDate(b.dateStarted) || 'No date'}</span>
        <span class="status-pill">${escapeHtml(b.status || 'Fermenting')}</span>
      </div>
    `;
    card.addEventListener('click', ()=> openDetail(b.id));
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ---------- FORM ---------- */
function resetForm(){
  document.getElementById('f-name').value = '';
  document.getElementById('f-recipe').value = '';
  document.getElementById('f-date').value = todayStr();
  document.getElementById('f-og').value = '';
  document.getElementById('f-status').value = 'Fermenting';
  currentIngRows = [{name:'',amount:'',unit:''}];
  renderIngRows();
}

function renderIngRows(){
  const wrap = document.getElementById('ingRows');
  wrap.innerHTML = '';
  currentIngRows.forEach((row,i)=>{
    const r = document.createElement('div');
    r.className = 'ing-row';
    r.innerHTML = `
      <input type="text" placeholder="Ingredient (e.g. Wildflower honey)" value="${escapeAttr(row.name)}" data-idx="${i}" data-field="name">
      <input type="text" placeholder="Amount" value="${escapeAttr(row.amount)}" data-idx="${i}" data-field="amount">
      <input type="text" placeholder="Unit (lb, g, tsp)" value="${escapeAttr(row.unit)}" data-idx="${i}" data-field="unit">
      <button type="button" class="remove-x" data-idx="${i}">✕</button>
    `;
    wrap.appendChild(r);
  });
  wrap.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      currentIngRows[idx][field] = e.target.value;
    });
  });
  wrap.querySelectorAll('.remove-x').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const idx = +e.target.dataset.idx;
      currentIngRows.splice(idx,1);
      if(currentIngRows.length===0) currentIngRows.push({name:'',amount:'',unit:''});
      renderIngRows();
    });
  });
}

function escapeAttr(str){
  return (str||'').replace(/"/g,'&quot;');
}

function openNewForm(){
  editingId = null;
  document.getElementById('formTitle').textContent = 'New Batch';
  resetForm();
  showView('formView');
}

function openEditForm(id){
  const b = batches.find(x=>x.id===id);
  if(!b) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Edit Batch';
  document.getElementById('f-name').value = b.name || '';
  document.getElementById('f-recipe').value = b.recipe || '';
  document.getElementById('f-date').value = b.dateStarted || todayStr();
  document.getElementById('f-og').value = b.og || '';
  document.getElementById('f-status').value = b.status || 'Fermenting';
  currentIngRows = b.ingredients && b.ingredients.length ? b.ingredients.map(x=>({...x})) : [{name:'',amount:'',unit:''}];
  renderIngRows();
  showView('formView');
}

async function saveBatch(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){
    alert('Give this batch a name first.');
    return;
  }
  const ingredients = currentIngRows.filter(r => r.name.trim() !== '');
  const data = {
    name,
    recipe: document.getElementById('f-recipe').value.trim(),
    dateStarted: document.getElementById('f-date').value,
    og: document.getElementById('f-og').value.trim(),
    status: document.getElementById('f-status').value,
    ingredients
  };

  if(editingId){
    const b = batches.find(x=>x.id===editingId);
    Object.assign(b, data);
  } else {
    batches.push({ id: uid(), notes: [], ...data });
  }
  await saveBatches();
  renderList();
  if(editingId){
    openDetail(editingId);
  } else {
    showView('listView');
  }
}

/* ---------- DETAIL ---------- */
function openDetail(id){
  activeBatchId = id;
  const b = batches.find(x=>x.id===id);
  if(!b) return;
  document.getElementById('d-name').textContent = b.name;
  document.getElementById('d-recipe').textContent = b.recipe || 'No recipe noted';
  document.getElementById('d-status').textContent = b.status || 'Fermenting';
  document.getElementById('d-og').textContent = b.og || '—';
  document.getElementById('d-date').textContent = fmtDate(b.dateStarted) || '—';

  const table = document.getElementById('d-ing-table');
  table.innerHTML = '';
  if(!b.ingredients || b.ingredients.length===0){
    table.innerHTML = `<tr><td style="color:var(--text-muted);">No ingredients logged.</td></tr>`;
  } else {
    b.ingredients.forEach(ing=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${escapeHtml(ing.name)}</td><td class="amt">${escapeHtml(ing.amount)} ${escapeHtml(ing.unit)}</td>`;
      table.appendChild(tr);
    });
  }

  document.getElementById('note-date').value = todayStr();
  document.getElementById('note-text').value = '';
  renderNotes(b);

  showView('detailView');
}

function renderNotes(b){
  const list = document.getElementById('notesList');
  list.innerHTML = '';
  if(!b.notes || b.notes.length===0){
    list.innerHTML = `<p style="color:var(--text-muted);font-size:0.88rem;">No notes yet — add tasting notes, gravity checks, or racking dates above.</p>`;
    return;
  }
  b.notes.slice().sort((a,c)=> c.date.localeCompare(a.date)).forEach(n=>{
    const div = document.createElement('div');
    div.className = 'note';
    div.innerHTML = `<div class="date">${fmtDate(n.date)}</div><p>${escapeHtml(n.text)}</p>`;
    list.appendChild(div);
  });
}

async function addNote(){
  const b = batches.find(x=>x.id===activeBatchId);
  if(!b) return;
  const date = document.getElementById('note-date').value || todayStr();
  const text = document.getElementById('note-text').value.trim();
  if(!text){
    alert('Write something in the note first.');
    return;
  }
  if(!b.notes) b.notes = [];
  b.notes.push({ date, text });
  await saveBatches();
  document.getElementById('note-text').value = '';
  renderNotes(b);
}

async function deleteBatch(){
  if(!confirm('Delete this batch and all its notes? This can\'t be undone.')) return;
  batches = batches.filter(x=>x.id!==activeBatchId);
  await saveBatches();
  renderList();
  showView('listView');
}

/* ---------- Google Drive sync ---------- */
const DEFAULT_CLIENT_ID = '914534684567-evs399rpob4t11b00kt3921atr0a2rcu.apps.googleusercontent.com';
const DRIVE_FILE_NAME = 'mead-log-data.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
let accessToken = null;
let tokenClient = null;
let driveFileId = localStorage.getItem('mead-drive-file-id') || null;

function getClientId(){
  return localStorage.getItem('mead-drive-client-id') || DEFAULT_CLIENT_ID;
}

function setDriveStatus(state, text){
  const dot = document.getElementById('driveDot');
  dot.className = 'dot' + (state ? ' ' + state : '');
  document.getElementById('driveStatusText').textContent = text;
}

function loadGisScript(){
  return new Promise((resolve, reject)=>{
    if(window.google && window.google.accounts && window.google.accounts.oauth2){
      resolve(); return;
    }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load Google sign-in script'));
    document.head.appendChild(s);
  });
}

async function connectDrive(){
  const clientId = getClientId();
  if(!clientId){
    document.getElementById('driveSettingsPanel').hidden = false;
    alert('Add your Google OAuth Client ID first.');
    return;
  }
  try{
    setDriveStatus('syncing', 'Connecting…');
    await loadGisScript();
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: DRIVE_SCOPE,
      callback: async (resp) => {
        if(resp.error){
          setDriveStatus('', 'Not connected to Google Drive');
          alert('Google sign-in failed: ' + resp.error);
          return;
        }
        accessToken = resp.access_token;
        document.getElementById('driveConnectBtn').textContent = 'Disconnect';
        setDriveStatus('syncing', 'Syncing…');
        await syncFromDrive();
        setDriveStatus('connected', 'Connected — synced with Google Drive');
      }
    });
    tokenClient.requestAccessToken();
  }catch(e){
    console.error(e);
    setDriveStatus('', 'Not connected to Google Drive');
    alert('Could not reach Google sign-in. Check your internet connection.');
  }
}

function disconnectDrive(){
  accessToken = null;
  document.getElementById('driveConnectBtn').textContent = 'Connect Drive';
  setDriveStatus('', 'Not connected to Google Drive');
}

async function driveFetch(url, opts={}){
  opts.headers = Object.assign({}, opts.headers, { Authorization: `Bearer ${accessToken}` });
  const res = await fetch(url, opts);
  if(res.status === 401){
    disconnectDrive();
    throw new Error('Drive session expired — please reconnect.');
  }
  return res;
}

async function getOrCreateFileId(){
  if(driveFileId) return driveFileId;
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}'`);
  const listRes = await driveFetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,name)`);
  const listData = await listRes.json();
  if(listData.files && listData.files.length > 0){
    driveFileId = listData.files[0].id;
  } else {
    const metadata = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
    const createRes = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Content-Type': 'multipart/related; boundary=meadlog' },
      body: `--meadlog\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--meadlog\r\nContent-Type: application/json\r\n\r\n[]\r\n--meadlog--`
    });
    const createData = await createRes.json();
    driveFileId = createData.id;
  }
  localStorage.setItem('mead-drive-file-id', driveFileId);
  return driveFileId;
}

async function pushToDrive(){
  if(!accessToken) return;
  try{
    const fileId = await getOrCreateFileId();
    await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(batches)
    });
    setDriveStatus('connected', 'Connected — last synced ' + new Date().toLocaleTimeString());
  }catch(e){
    console.error('Drive push failed', e);
    setDriveStatus('', 'Sync failed — ' + e.message);
  }
}

async function syncFromDrive(){
  if(!accessToken) return;
  try{
    const fileId = await getOrCreateFileId();
    const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    const text = await res.text();
    if(!text || !text.trim()) return;
    const remoteBatches = JSON.parse(text);
    if(batches.length === 0 && remoteBatches.length > 0){
      batches = remoteBatches;
      await store.set(STORAGE_KEY, JSON.stringify(batches));
      renderList();
    } else if(remoteBatches.length > 0 && JSON.stringify(remoteBatches) !== JSON.stringify(batches)){
      const useCloud = confirm('Your Google Drive backup has different data than this device. Click OK to use the Drive version, or Cancel to keep this device\'s data (and overwrite Drive with it).');
      if(useCloud){
        batches = remoteBatches;
        await store.set(STORAGE_KEY, JSON.stringify(batches));
        renderList();
      } else {
        await pushToDrive();
      }
    }
  }catch(e){
    console.error('Drive sync failed', e);
  }
}

document.getElementById('driveConnectBtn').addEventListener('click', ()=>{
  if(accessToken){ disconnectDrive(); } else { connectDrive(); }
});
document.getElementById('driveSettingsBtn').addEventListener('click', ()=>{
  document.getElementById('clientIdInput').value = getClientId();
  document.getElementById('driveSettingsPanel').hidden = !document.getElementById('driveSettingsPanel').hidden;
});
document.getElementById('closeSettingsBtn').addEventListener('click', ()=>{
  document.getElementById('driveSettingsPanel').hidden = true;
});
document.getElementById('saveClientIdBtn').addEventListener('click', ()=>{
  const val = document.getElementById('clientIdInput').value.trim();
  if(val) localStorage.setItem('mead-drive-client-id', val);
  document.getElementById('driveSettingsPanel').hidden = true;
  alert('Client ID saved.');
});

loadBatches();
